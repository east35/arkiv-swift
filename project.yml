name: ArkivApp
options:
  bundleIdPrefix: com.arkiv
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  groupSortPosition: top
  xcodeVersion: "15.3"

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
  configs:
    Debug:
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGNING_ALLOWED: NO
    Release:
      CODE_SIGN_STYLE: Automatic

configs:
  Debug: debug
  Release: release

packages:
  Core:
    path: Packages/Core
  DesignSystem:
    path: Packages/DesignSystem
  Games:
    path: Packages/Features/Games

targets:
  ArkivApp:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: ArkivApp
        excludes:
          - "**/*.xcconfig"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arkiv.app
        PRODUCT_NAME: Arkiv
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: ArkivApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: ArkivApp/ArkivApp.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
      configs:
        Debug:
          xcconfig: ArkivApp/Config.xcconfig
        Release:
          xcconfig: ArkivApp/Config.xcconfig
    dependencies:
      - package: Core
        product: Core
      - package: DesignSystem
        product: DesignSystem
      - package: Games
        product: Games
