name: arkivApp
options:
  bundleIdPrefix: com.arkiv
  createIntermediateGroups: true
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  groupSortPosition: top
  xcodeVersion: "15.3"
  # Pin the project format so projects generated on a machine with Xcode 26+
  # remain readable by CI runners / teammates on older Xcodes.
  compatibilityVersion: "Xcode 14.0"

settings:
  base:
    SWIFT_VERSION: "5.10"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
  configs:
    Debug:
      CODE_SIGN_IDENTITY: ""
      CODE_SIGNING_REQUIRED: NO
      CODE_SIGNING_ALLOWED: NO
    Release:
      CODE_SIGN_STYLE: Automatic

configs:
  Debug: debug
  Release: release

packages:
  Core:
    path: Packages/Core
  DesignSystem:
    path: Packages/DesignSystem
  Games:
    path: Packages/Features/Games
  Auth:
    path: Packages/Features/Auth

targets:
  arkivApp:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - path: arkivApp
        excludes:
          - "**/*.xcconfig"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.arkiv.app
        PRODUCT_NAME: arkiv
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: arkivApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: arkivApp/arkivApp.entitlements
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
      configs:
        Debug:
          xcconfig: arkivApp/Config.xcconfig
        Release:
          xcconfig: arkivApp/Config.xcconfig
    dependencies:
      - package: Core
        product: Core
      - package: DesignSystem
        product: DesignSystem
      - package: Games
        product: Games
      - package: Auth
        product: AuthFeature
