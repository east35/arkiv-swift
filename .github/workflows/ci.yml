name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package-tests:
    name: SwiftPM Tests
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Test Core package
        run: swift test --package-path Packages/Core

      - name: Test DesignSystem package
        run: swift test --package-path Packages/DesignSystem

      - name: Test Auth feature package
        run: swift test --package-path Packages/Features/Auth

  build-ios:
    name: Build (iOS Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project arkivApp.xcodeproj \
            -scheme arkivApp \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build

  build-macos:
    name: Build (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build for macOS
        run: |
          set -o pipefail
          xcodebuild \
            -project arkivApp.xcodeproj \
            -scheme arkivApp \
            -destination 'generic/platform=macOS' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build
